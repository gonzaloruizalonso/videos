<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secuencias Móviles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000;
            --text-light: #fff;
            --ios-blur: rgba(30, 30, 30, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #111;
            color: var(--text-light);
            overflow: hidden; /* Evita scroll en móvil */
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* Contenedor principal que simula la pantalla */
        #screen-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop') center/cover;
        }

        /* Vistas de las escenas */
        .scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
        }

        .scene.active {
            display: block;
        }

        /* --- ESCENA 1: CAOS --- */
        #scene-caos {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            padding: 20px;
        }
        .time-display {
            text-align: center;
            font-size: 5rem;
            font-weight: 200;
            margin-top: 50px;
        }
        #notif-container {
            margin-top: 30px;
            height: 60%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .notification {
            background: rgba(255, 255, 255, 0.85);
            color: #000;
            padding: 15px;
            border-radius: 15px;
            transform: translateY(-20px);
            opacity: 0;
            animation: slideIn 0.3s forwards;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .notif-header { font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; opacity: 0.7; }
        @keyframes slideIn {
            to { transform: translateY(0); opacity: 1; }
        }

        /* --- ESCENA 2: CHAT --- */
        #scene-chat {
            background: #e5ddd5;
        }
        .chat-header {
            background: #075e54;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            color: white;
            font-weight: bold;
        }
        .chat-messages {
            height: calc(100% - 120px);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .msg { background: white; color: black; padding: 10px; border-radius: 10px; max-width: 70%; }
        .msg.sent { background: #dcf8c6; align-self: flex-end; }
        .chat-input {
            height: 60px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        .input-bar {
            flex-grow: 1;
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            color: gray;
        }
        /* Alerta Batería iOS */
        .ios-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(240, 240, 240, 0.95);
            backdrop-filter: blur(10px);
            color: black;
            width: 280px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: none;
        }
        .ios-alert h3 { margin: 20px 0 5px; font-size: 1.1rem; }
        .ios-alert p { font-size: 0.9rem; margin-bottom: 20px; }
        .ios-alert button {
            border: none;
            border-top: 1px solid #ccc;
            background: none;
            width: 100%;
            padding: 15px;
            color: #007aff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- ESCENA 3: COLAPSO --- */
        #scene-colapso {
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* --- ESCENA 4: DESPERTAR --- */
        #scene-despertar {
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .apple-logo {
            font-size: 4rem;
            color: white;
        }

        /* --- ESCENA 5: SECUENCIA --- */
        #scene-secuencia {
            /* Mismo fondo principal */
        }
        .control-center {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--ios-blur);
            backdrop-filter: blur(20px);
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .cc-module {
            background: rgba(255,255,255,0.2);
            width: 150px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 15px;
            gap: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .moon-icon {
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        .moon-icon.active { background: #5e5ce6; color: white; }
        
        .music-app {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1c1e;
            transform: scale(0.8) translateY(100%);
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .album-art { width: 250px; height: 250px; background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); border-radius: 10px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: transform 0.2s;}
        .album-art.playing { transform: scale(1.05); }
        .play-btn { font-size: 3rem; color: white; cursor: pointer; transition: transform 0.1s;}
        .play-btn:active { transform: scale(0.9); }

        /* Interfaz de usuario de la web (Menús) */
        .controls {
            background: #222;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
        }
        .top-controls { display: flex; justify-content: space-between; align-items: center; }
        .btn {
            background: #444;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn:hover { background: #555; }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .menu-grid button { width: 100%; padding: 12px; }

    </style>
</head>
<body>

    <div id="screen-container">
        <div id="scene-caos" class="scene">
            <div class="time-display">12:38</div>
            <div id="notif-container"></div>
            <div class="ios-alert" id="caos-battery">
                <h3>Batería baja</h3>
                <p>Queda un 20% de batería.</p>
                <button onclick="document.getElementById('caos-battery').style.display='none'">Cerrar</button>
            </div>
        </div>

        <div id="scene-chat" class="scene">
            <div class="chat-header">Grupo de colegas</div>
            <div class="chat-messages">
                <div class="msg">¿A qué hora quedamos?</div>
                <div class="msg sent">No lo sé, luego os digo.</div>
            </div>
            <div class="chat-input">
                <div class="input-bar">Yo creo que sobre las |</div>
            </div>
            <div class="ios-alert" id="chat-battery" style="display: block;">
                <h3>Batería baja</h3>
                <p>Queda un 10% de batería.</p>
                <button>Cerrar</button>
            </div>
        </div>

        <div id="scene-colapso" class="scene">
            <div class="spinner"></div>
        </div>

        <div id="scene-despertar" class="scene">
            <i class="fa-brands fa-apple apple-logo"></i>
        </div>

        <div id="scene-secuencia" class="scene">
            <div class="control-center" id="cc-overlay">
                <div class="cc-module">
                    <div class="moon-icon" id="moon-btn"><i class="fa-solid fa-moon"></i></div>
                    <span>Enfoque</span>
                </div>
            </div>
            <div class="music-app" id="music-overlay">
                <div class="album-art" id="album-cover"></div>
                <i class="fa-solid fa-play play-btn" id="play-btn"></i>
            </div>
        </div>
    </div>

    <div class="controls">
        <div class="top-controls">
            <span style="font-weight: bold; font-size: 1.1rem;">Simulador Móvil</span>
            <button class="btn" id="fs-btn"><i class="fa-solid fa-expand"></i> Pantalla Completa</button>
        </div>
        <div class="menu-grid">
            <button class="btn" onclick="activarEscena('caos')">1. Caos Estático</button>
            <button class="btn" onclick="activarEscena('chat')">2. El Origen</button>
            <button class="btn" onclick="activarEscena('colapso')">3. Colapso</button>
            <button class="btn" onclick="activarEscena('despertar')">4. Despertar</button>
            <button class="btn" style="grid-column: span 2;" onclick="iniciarSecuencia()">5. Liberación (Secuencia)</button>
        </div>
    </div>

    <script>
        let caosInterval;
        let notifCount = 0;
        const mensajesCaos = [
            { app: 'WhatsApp', text: 'Este grupo para qué es?' },
            { app: 'TikTok', text: 'Nuevas interacciones en el vídeo de @coastergrapher' },
            { app: 'WhatsApp', text: 'Halloween Factory' },
            { app: 'Instagram', text: 'A 5 personas les ha gustado tu historia' },
            { app: 'WhatsApp', text: 'Este es un grupo para hablar del lunes en Warner' }
        ];

        // Gestión de Pantalla Completa
        const fsBtn = document.getElementById('fs-btn');
        fsBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error al intentar iniciar pantalla completa: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // Limpiar todas las escenas
        function limpiarEscenas() {
            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
            clearInterval(caosInterval);
            document.getElementById('notif-container').innerHTML = '';
            
            // Resetear estado de la secuencia
            document.getElementById('cc-overlay').style.transform = 'translateY(-100%)';
            document.getElementById('moon-btn').classList.remove('active');
            document.getElementById('music-overlay').style.opacity = '0';
            document.getElementById('music-overlay').style.transform = 'scale(0.8) translateY(100%)';
            document.getElementById('album-cover').classList.remove('playing');
            document.getElementById('play-btn').classList.replace('fa-pause', 'fa-play');
        }

        function activarEscena(escenaId) {
            limpiarEscenas();
            document.getElementById(`scene-${escenaId}`).classList.add('active');

            if (escenaId === 'caos') {
                iniciarCaos();
            } else if (escenaId === 'chat') {
                document.getElementById('chat-battery').style.display = 'block';
            }
        }

        // Lógica del Caos
        function iniciarCaos() {
            document.getElementById('caos-battery').style.display = 'none';
            notifCount = 0;
            const container = document.getElementById('notif-container');
            
            caosInterval = setInterval(() => {
                const msg = mensajesCaos[notifCount % mensajesCaos.length];
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.innerHTML = `<div class="notif-header">${msg.app}</div><div>${msg.text}</div>`;
                container.prepend(notif);
                
                notifCount++;

                // A los 5 segundos salta la batería
                if (notifCount === 5) {
                    document.getElementById('caos-battery').style.display = 'block';
                }
            }, 800);
        }

        // Lógica de la Secuencia (El Centro de Control y la Música)
        function iniciarSecuencia() {
            limpiarEscenas();
            document.getElementById('scene-secuencia').classList.add('active');
            
            const cc = document.getElementById('cc-overlay');
            const moon = document.getElementById('moon-btn');
            const music = document.getElementById('music-overlay');
            const playBtn = document.getElementById('play-btn');
            const album = document.getElementById('album-cover');

            // Timeline basado en Timeouts para orquestar la animación fluida
            setTimeout(() => { cc.style.transform = 'translateY(0)'; }, 500); // Baja centro de control
            setTimeout(() => { moon.classList.add('active'); }, 1800); // Activa No Molestar
            setTimeout(() => { cc.style.transform = 'translateY(-100%)'; }, 2800); // Sube centro de control
            setTimeout(() => { 
                music.style.transform = 'scale(1) translateY(0)';
                music.style.opacity = '1';
            }, 3500); // Abre app de música
            setTimeout(() => { 
                playBtn.classList.replace('fa-play', 'fa-pause');
                album.classList.add('playing');
            }, 5000); // Pulsa Play
        }
    </script>
</body>
</html>
