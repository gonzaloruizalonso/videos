<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secuencias Móviles</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000;
            --ios-blur: rgba(30, 30, 30, 0.7);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none; /* Evita que el texto se seleccione por error */
        }

        body {
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal: El "iPhone" */
        #iphone-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1000&auto=format&fit=crop') center/cover;
            overflow: hidden;
        }

        /* --- UI DE iOS --- */
        #status-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 44px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            z-index: 100;
            font-size: 0.9rem;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
        .dynamic-island {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 101;
        }
        .icons { display: flex; gap: 7px; font-size: 0.8rem; }
        
        .home-indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 5px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            z-index: 100;
            transition: opacity 0.3s;
        }

        /* --- MENÚ DE CONTROL (WEB) --- */
        #menu-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 1000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #menu-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .menu-title { font-size: 1.5rem; font-weight: bold; margin-bottom: 30px; }
        .menu-grid { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 15px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            backdrop-filter: blur(5px);
        }
        .btn:active { background: rgba(255,255,255,0.3); }

        /* Botón para volver al menú */
        #btn-volver {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s;
        }
        #btn-volver.visible { opacity: 1; visibility: visible; }

        /* --- ESCENAS --- */
        .scene {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
            z-index: 50;
        }
        .scene.active { opacity: 1; visibility: visible; }

        /* ESCENA 1: CAOS */
        #scene-caos { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); padding-top: 60px; }
        .lock-time { text-align: center; font-size: 5.5rem; font-weight: 200; margin-top: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        #notif-container { margin-top: 20px; padding: 0 15px; height: 60%; overflow: hidden; display: flex; flex-direction: column; gap: 8px; }
        .notification {
            background: rgba(255, 255, 255, 0.85);
            color: #000;
            padding: 12px 15px;
            border-radius: 18px;
            transform: translateY(-20px) scale(0.95);
            opacity: 0;
            animation: popIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .notif-header { font-weight: 600; font-size: 0.8rem; margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
        .notif-header i { font-size: 1rem; }
        .notif-text { font-size: 0.95rem; }
        @keyframes popIn { to { transform: translateY(0) scale(1); opacity: 1; } }

        /* ESCENA 2: CHAT */
        #scene-chat { background: #e5ddd5; }
        .chat-bg { background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); opacity: 0.1; position: absolute; width:100%; height:100%; z-index:-1;}
        .chat-header { background: #f6f6f6; height: 90px; padding-top: 45px; padding-left: 15px; color: black; font-weight: 600; border-bottom: 1px solid #ddd; display: flex; align-items: center;}
        .chat-messages { padding: 15px; display: flex; flex-direction: column; gap: 10px; height: calc(100% - 170px); }
        .msg { background: white; color: black; padding: 10px 15px; border-radius: 15px; max-width: 75%; font-size: 0.95rem; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .msg.sent { background: #dcf8c6; align-self: flex-end; }
        .chat-input { height: 80px; background: #f6f6f6; position: absolute; bottom: 0; width: 100%; display: flex; align-items: center; padding: 0 15px 20px; }
        .input-bar { flex-grow: 1; background: white; border-radius: 20px; border: 1px solid #ddd; padding: 10px 15px; color: #333; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background: #007aff; vertical-align: middle; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* ALERTA BATERÍA iOS */
        .ios-alert {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(1.1);
            background: rgba(240, 240, 240, 0.9); backdrop-filter: blur(20px);
            color: black; width: 270px; border-radius: 15px; text-align: center;
            z-index: 200; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            opacity: 0; visibility: hidden; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .ios-alert.show { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .ios-alert h3 { margin: 20px 0 5px; font-size: 1.05rem; }
        .ios-alert p { font-size: 0.85rem; margin-bottom: 20px; }
        .ios-alert button { border: none; border-top: 1px solid rgba(0,0,0,0.2); background: none; width: 100%; padding: 15px; color: #007aff; font-size: 1.05rem; cursor: pointer; }

        /* ESCENA 3: COLAPSO */
        #scene-colapso { background: #000; display: flex; justify-content: center; align-items: center; z-index: 150; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ESCENA 4: DESPERTAR */
        #scene-despertar { background: #000; display: flex; justify-content: center; align-items: center; z-index: 150; }
        .apple-logo { font-size: 4rem; color: white; }

        /* ESCENA 5: SECUENCIA */
        #scene-secuencia { z-index: 50; }
        .control-center {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--ios-blur); backdrop-filter: blur(25px);
            transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; justify-content: center; align-items: center; z-index: 60;
        }
        .cc-module { background: rgba(255,255,255,0.15); width: 160px; height: 65px; border-radius: 20px; display: flex; align-items: center; padding: 15px; gap: 15px; font-weight: 600; font-size: 1.1rem; }
        .moon-icon { background: rgba(0,0,0,0.5); border-radius: 50%; width: 35px; height: 35px; display: flex; justify-content: center; align-items: center; transition: all 0.3s ease; }
        .moon-icon.active { background: #5e5ce6; color: white; }
        
        .music-app {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #1c1c1e; transform: scale(0.9) translateY(50px); opacity: 0;
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 55;
        }
        .album-art { width: 280px; height: 280px; background: url('https://images.unsplash.com/photo-1465101162946-4377e57745c3?q=80&w=600&auto=format&fit=crop') center/cover; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); transform: scale(0.95);}
        .album-art.playing { transform: scale(1.05); }
        .track-info { text-align: center; margin-bottom: 40px; }
        .track-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }
        .track-artist { font-size: 1rem; color: #aaa; }
        .play-controls { font-size: 3rem; color: white; }
    </style>
</head>
<body>

    <div id="iphone-screen">
        <div id="status-bar">
            <div class="time">07:12</div>
            <div class="dynamic-island"></div>
            <div class="icons"><i class="fa-solid fa-signal"></i> <i class="fa-solid fa-wifi"></i> <i class="fa-solid fa-battery-three-quarters"></i></div>
        </div>

        <div id="scene-caos" class="scene">
            <div class="lock-time">07:12</div>
            <div id="notif-container"></div>
            <div class="ios-alert" id="caos-battery">
                <h3>Batería baja</h3>
                <p>Queda un 20% de batería.</p>
                <button onclick="cerrarAlerta('caos-battery')">Cerrar</button>
            </div>
        </div>

        <div id="scene-chat" class="scene">
            <div class="chat-bg"></div>
            <div class="chat-header">Grupo de colegas</div>
            <div class="chat-messages">
                <div class="msg">Este grupo para qué es?</div>
                <div class="msg sent">Este es un grupo para hablar del lunes en Warner</div>
                <div class="msg">Halloween Factory</div>
            </div>
            <div class="chat-input">
                <div class="input-bar">Yo creo que sobre las <span class="cursor"></span></div>
            </div>
            <div class="ios-alert" id="chat-battery">
                <h3>Batería baja</h3>
                <p>Queda un 10% de batería.</p>
                <button onclick="cerrarAlerta('chat-battery')">Cerrar</button>
            </div>
        </div>

        <div id="scene-colapso" class="scene"><div class="spinner"></div></div>
        <div id="scene-despertar" class="scene"><i class="fa-brands fa-apple apple-logo"></i></div>

        <div id="scene-secuencia" class="scene">
            <div class="control-center" id="cc-overlay">
                <div class="cc-module"><div class="moon-icon" id="moon-btn"><i class="fa-solid fa-moon"></i></div><span>Enfoque</span></div>
            </div>
            <div class="music-app" id="music-overlay">
                <div class="album-art" id="album-cover"></div>
                <div class="track-info">
                    <div class="track-title">Sparkle</div>
                    <div class="track-artist">RADWIMPS</div>
                </div>
                <div class="play-controls"><i class="fa-solid fa-play" id="play-btn"></i></div>
            </div>
        </div>

        <div class="home-indicator"></div>

        <div id="menu-overlay">
            <div class="menu-title">Selecciona Secuencia</div>
            <div class="menu-grid">
                <button class="btn" onclick="iniciar('caos')">1. Caos Estático</button>
                <button class="btn" onclick="iniciar('chat')">2. El Origen</button>
                <button class="btn" onclick="iniciar('colapso')">3. Colapso</button>
                <button class="btn" onclick="iniciar('despertar')">4. Despertar</button>
                <button class="btn" onclick="iniciar('secuencia')">5. Liberación (Secuencia)</button>
            </div>
        </div>

        <button id="btn-volver" onclick="mostrarMenu()">Volver al Menú</button>
    </div>

    <script>
        let caosInterval;
        let notifCount = 0;
        const mensajesCaos = [
            { app: '<i class="fa-brands fa-whatsapp" style="color:#25D366"></i> WhatsApp', text: 'Este grupo para qué es?' },
            { app: '<i class="fa-brands fa-tiktok"></i> TikTok', text: 'Nuevas interacciones en @coastergrapher' },
            { app: '<i class="fa-brands fa-whatsapp" style="color:#25D366"></i> WhatsApp', text: 'Halloween Factory' },
            { app: '<i class="fa-brands fa-instagram" style="color:#E1306C"></i> Instagram', text: 'A 5 personas les ha gustado tu historia' }
        ];

        function solicitarPantallaCompleta() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen().catch(()=>{}); }
        }

        function iniciar(escenaId) {
            solicitarPantallaCompleta();
            
            // Ocultar menú
            document.getElementById('menu-overlay').classList.add('hidden');
            document.getElementById('btn-volver').classList.remove('visible');
            
            // Apagar status bar en colapso y despertar
            const statusBar = document.getElementById('status-bar');
            if(escenaId === 'colapso' || escenaId === 'despertar') {
                statusBar.style.opacity = '0';
            } else {
                statusBar.style.opacity = '1';
                // En secuencia, los iconos son blancos. En chat, negros
                statusBar.style.color = escenaId === 'chat' ? 'black' : 'white';
                statusBar.style.textShadow = escenaId === 'chat' ? 'none' : '0 1px 3px rgba(0,0,0,0.5)';
            }

            // Limpiar y activar escena
            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
            clearInterval(caosInterval);
            document.getElementById('notif-container').innerHTML = '';
            
            // Reset Secuencia
            document.getElementById('cc-overlay').style.transform = 'translateY(-100%)';
            document.getElementById('moon-btn').classList.remove('active');
            document.getElementById('music-overlay').style.opacity = '0';
            document.getElementById('music-overlay').style.transform = 'scale(0.9) translateY(50px)';
            document.getElementById('album-cover').classList.remove('playing');
            document.getElementById('play-btn').classList.replace('fa-pause', 'fa-play');

            // Mostrar escena
            document.getElementById(`scene-${escenaId}`).classList.add('active');

            if (escenaId === 'caos') iniciarCaos();
            else if (escenaId === 'chat') setTimeout(() => document.getElementById('chat-battery').classList.add('show'), 1500);
            else if (escenaId === 'secuencia') arrancarSecuencia();

            // Mostrar botón de volver después de un rato para no interrumpir
            setTimeout(() => {
                document.getElementById('btn-volver').classList.add('visible');
            }, 3000);
        }

        function mostrarMenu() {
            document.getElementById('menu-overlay').classList.remove('hidden');
            document.getElementById('btn-volver').classList.remove('visible');
            if (document.fullscreenElement) { document.exitFullscreen().catch(()=>{}); }
        }

        function cerrarAlerta(id) {
            document.getElementById(id).classList.remove('show');
        }

        function iniciarCaos() {
            document.getElementById('caos-battery').classList.remove('show');
            notifCount = 0;
            const container = document.getElementById('notif-container');
            
            caosInterval = setInterval(() => {
                const msg = mensajesCaos[notifCount % mensajesCaos.length];
                const notif = document.createElement('div');
                notif.className = 'notification';
                notif.innerHTML = `<div class="notif-header">${msg.app}</div><div class="notif-text">${msg.text}</div>`;
                container.prepend(notif);
                
                notifCount++;
                if (notifCount === 5) {
                    document.getElementById('caos-battery').classList.add('show');
                }
            }, 800);
        }

        function arrancarSecuencia() {
            const cc = document.getElementById('cc-overlay');
            const moon = document.getElementById('moon-btn');
            const music = document.getElementById('music-overlay');
            const playBtn = document.getElementById('play-btn');
            const album = document.getElementById('album-cover');

            setTimeout(() => { cc.style.transform = 'translateY(0)'; }, 600);
            setTimeout(() => { moon.classList.add('active'); }, 1800);
            setTimeout(() => { cc.style.transform = 'translateY(-100%)'; }, 2800);
            setTimeout(() => { 
                music.style.transform = 'scale(1) translateY(0)';
                music.style.opacity = '1';
                document.getElementById('status-bar').style.color = 'white'; // Asegurar color en app de música
            }, 3500);
            setTimeout(() => { 
                playBtn.classList.replace('fa-play', 'fa-pause');
                album.classList.add('playing');
            }, 4800);
        }
    </script>
</body>
</html>
